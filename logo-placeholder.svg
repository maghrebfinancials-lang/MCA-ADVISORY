  <rect x="9" y="12" width="5" height="38" fill="#C9A45C" opacity="0.7"/>
  <rect x="18" y="18" width="5" height="32" fill="#C9A45C" opacity="0.4"/>
  <!-- Horizontal crossbar -->
  <rect x="0" y="28" width="23" height="2.5" fill="#C9A45C"/>
  <!-- MCA text -->
  <text x="32" y="26" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#F8F5EF" letter-spacing="3">MCA</text>
